name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/tech_store_ci
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/tech_store_ci
      NEXT_PUBLIC_SITE_URL: https://tech-store.example.com

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: tech_store_ci
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d tech_store_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Apply database migrations
        run: npx prisma migrate deploy

      - name: Build
        run: npm run build
